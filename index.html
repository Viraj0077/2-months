<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Book 💛</title>

  <!-- Minecraft font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="pixel-bg"></div>

  <!-- Sparkles layer -->
  <canvas id="sparkles"></canvas>

  <!-- Sounds -->
  <audio id="flipSound" preload="auto">
    <source src="pageflip.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<audio id="typeSound" preload="auto">
  <source src="type.mp3" type="audio/mpeg">
</audio>



  <main class="screen">
    <section class="book-stage">
      <div class="book floating" id="book">

        <!-- Hearts INSIDE top area only -->
        <div class="cornerHearts topLeft"></div>
        <div class="cornerHearts topRight"></div>

        <!-- Cover -->
        <div class="book-cover" id="cover">
          <div class="cover-inner">
            <div class="mc-title">Written Book</div>
            <div class="mc-sub">by Viraj</div>
            <div class="mc-mini">2 Month Anniversary 💛</div>

            <button class="mc-btn mc-btn-gold" id="openBtn">
              Open Book
            </button>

            <div class="tiny-note">Click Open (don’t be shy) 👁️</div>
          </div>
        </div>

        <!-- Pages UI -->
        <div class="book-ui" id="ui">
          <div class="page">
            <div class="page-content" id="pageContent">
              <div class="page-title" id="pageTitle"></div>
              <div class="page-text" id="pageText"></div>

              <img id="pageImage" class="page-image" alt="" />
            </div>
          </div>

          <div class="mc-bar">
            <button class="mc-btn" id="prevBtn">◀ Previous</button>

            <div class="page-counter">
              Page <span id="pageNum">1</span> / <span id="pageTotal">5</span>
            </div>

            <button class="mc-btn" id="nextBtn">Next ▶</button>
          </div>

          <button class="mc-btn mc-btn-red done-btn" id="doneBtn">Done</button>
          <button class="mc-btn mc-btn-gold music-btn" id="musicBtn">♫ Play Music</button>

        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
